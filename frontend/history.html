<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtmosAI — Prediction History</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="icon" type="image/png" href="static/images/favicon.png">
</head>
<body>

    <!-- Page Loader -->
    <div id="page-loader">
        <div class="loader-ring"></div>
        <p class="loader-text">AtmosAI</p>
    </div>

    <div class="atmos-bg"></div>

    <!-- Mode 1: Sunny Layer -->
    <div class="sunny-elements">
        <div class="sun-scene">
            <div class="sun-glow"></div>
            <div class="sun-core"></div>
            <div class="sun-rays"></div>
        </div>
        <div class="bird-scene"></div>
    </div>

    <!-- Mode 2: Rainy Layer -->
    <div class="rainy-elements">
        <div class="cloud-scene">
            <div class="cloud cloud-a cl-1"></div>
            <div class="cloud cloud-b cl-2"></div>
            <div class="cloud cloud-a cl-3"></div>
            <div class="cloud cloud-c cl-4"></div>
            <div class="cloud cloud-b cl-5"></div>
            <div class="cloud cloud-a cl-6"></div>
            <div class="cloud cloud-c cl-7"></div>
            <div class="cloud cloud-b cl-8"></div>
        </div>
        <div class="rain-scene"></div>
        <div class="lightning-overlay"></div>
        <svg class="lightning-bolt" viewBox="0 0 100 100" preserveAspectRatio="none">
            <polyline points="50,0 45,30 55,30 42,70 52,70 38,100"
                      stroke="rgba(200,230,255,0.9)" stroke-width="0.8"
                      fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>

    <!-- Mode 3: Winter Layer -->
    <div class="winter-elements">
        <div class="snow-scene"></div>
        <div class="aurora-borealis"></div>
        <!-- Advanced Background FX -->
        <div class="shooting-stars"></div>
        <div class="frost-vignette"></div>
        
        <!-- Drifting Mist Layers -->
        <div class="winter-mist mist-1"></div>
        <div class="winter-mist mist-2"></div>
        <div class="winter-mist mist-3"></div>
        <!-- Ground Frost -->
        <div class="ground-frost"></div>
        <!-- Ice Shimmer Particles (CSS-only) -->
        <div class="ice-particles">
            <span class="ice-dot" style="--ix:10%;--iy:70%;--id:0s;--is:1.2"></span>
            <span class="ice-dot" style="--ix:25%;--iy:55%;--id:0.8s;--is:0.9"></span>
            <span class="ice-dot" style="--ix:40%;--iy:80%;--id:1.4s;--is:1.5"></span>
            <span class="ice-dot" style="--ix:60%;--iy:65%;--id:0.3s;--is:0.7"></span>
            <span class="ice-dot" style="--ix:75%;--iy:75%;--id:1.1s;--is:1.3"></span>
            <span class="ice-dot" style="--ix:88%;--iy:60%;--id:0.6s;--is:1.0"></span>
            <span class="ice-dot" style="--ix:50%;--iy:45%;--id:1.8s;--is:0.8"></span>
            <span class="ice-dot" style="--ix:15%;--iy:40%;--id:2.2s;--is:1.1"></span>
        </div>
    </div>
    <div class="grain"></div>

    <!-- Navigation -->
    <nav>
        <a href="/" class="nav-logo">
            <div class="logo-icon">🌦</div>
            <span class="logo-text">Atmos<span>AI</span></span>
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link">
                <span class="nav-icon">⚡</span> Predict
            </a>
            <a href="/about" class="nav-link">
                <span class="nav-icon">📡</span> About
            </a>
            <a href="/history" class="nav-link active">
                <span class="nav-icon">🕒</span> History
            </a>
            <!-- Theme Toggle -->
            <button class="theme-toggle-btn" id="theme-toggle" title="Switch Mode">
                <span class="toggle-icon">☀️</span>
                <span class="mode-name">Sunny Mode</span>
            </button>
        </div>
    </nav>

    <!-- Content -->
    <div class="page-wrapper">
        <div class="glow-border-wrap">
            <div class="glass-card">

                <!-- Header -->
                <div class="history-header">
                    <div>
                        <h1>Prediction History</h1>
                        <p>
                            Loading history...
                        </p>
                    </div>
                    <a href="index.html" class="btn-outline">+ New Prediction</a>
                </div>

                <!-- History List -->
                <div class="history-list">
                    <!-- Populated by JavaScript -->
                </div>

                <!-- Empty State -->
                <div class="empty-state" style="display:none;">
                    <span class="empty-icon">🌤</span>
                    <h3>No predictions yet</h3>
                    <p>Your prediction history will appear here once you run your first analysis.</p>
                    <a href="index.html" class="btn-primary" style="display:inline-block; width:auto; padding:13px 28px; margin-top:22px; border-radius:10px; font-size:0.85rem; text-decoration:none;">
                        Make First Prediction →
                    </a>
                </div>

            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 AtmosAI &nbsp;·&nbsp; Advanced Climate Intelligence Platform
    </footer>

    <script src="static/js/script.js"></script>
</body>
</html>
